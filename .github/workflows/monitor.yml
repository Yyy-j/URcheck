name: URcheck Monitor

on:
  schedule:
    # 每 15 分钟运行一次（GitHub Actions 使用 UTC）
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write  # 允许在工作流中推回 last_state.json

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py

      - name: Commit and push last_state.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_state.json || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update last_state.json [ci skip]" || echo "no commit"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
