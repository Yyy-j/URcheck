name: URcheck Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式（直接用 last_state.json 的值发通知，不爬网站）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  repository_dispatch:
    types: [trigger-monitor]

permissions:
  contents: write

concurrency:
  group: urcheck-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: |
          python monitor.py

      - name: Commit and push last_state.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add last_state.json || true

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update last_state.json [ci skip]" || echo "no commit"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
